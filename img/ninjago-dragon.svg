  <!-- Snout -->
  <ellipse cx="24" cy="21" rx="3" ry="2.5" fill="#B22222" stroke="#600000" stroke-width="1"/>
  <!-- Eye -->
  <circle cx="29" cy="18" r="1.5" fill="#FFD700"/>
  <circle cx="29" cy="18" r="0.7" fill="#000"/>
