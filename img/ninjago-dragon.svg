  <path d="M18,28 C16,24 20,18 26,18 C30,18 34,20 36,24 C38,28 40,34 38,40 C36,46 30,50 24,48 C18,46 16,40 18,34 Z" fill="url(#dg)" stroke="#600000" stroke-width="1.5"/>
