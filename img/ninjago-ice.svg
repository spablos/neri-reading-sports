<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <defs>
    <linearGradient id="ig" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E0F0FF"/>
      <stop offset="50%" style="stop-color:#B0D4F1"/>
      <stop offset="100%" style="stop-color:#87CEEB"/>
    </linearGradient>
  </defs>
  <!-- Main crystal body -->
  <polygon points="30,4 40,18 40,42 30,56 20,42 20,18" fill="url(#ig)" stroke="#6495ED" stroke-width="1.5"/>
  <!-- Crystal facets -->
  <polygon points="30,4 30,56 20,42 20,18" fill="#C8E0F4" opacity="0.6"/>
  <polygon points="30,4 30,56 40,42 40,18" fill="#A0C4E8" opacity="0.4"/>
  <!-- Highlight -->
  <polygon points="30,8 24,20 24,30 30,22" fill="white" opacity="0.5"/>
  <!-- Small crystals -->
  <polygon points="12,30 16,22 20,30 16,36" fill="url(#ig)" stroke="#6495ED" stroke-width="1" opacity="0.7"/>
  <polygon points="48,28 44,20 40,28 44,34" fill="url(#ig)" stroke="#6495ED" stroke-width="1" opacity="0.7"/>
  <!-- Sparkle -->
  <circle cx="26" cy="16" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="36" cy="36" r="1" fill="white" opacity="0.6"/>
</svg>
