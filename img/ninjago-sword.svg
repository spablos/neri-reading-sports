<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <defs>
    <linearGradient id="blade" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E8E8"/>
      <stop offset="50%" style="stop-color:#C0C0C0"/>
      <stop offset="100%" style="stop-color:#909090"/>
    </linearGradient>
  </defs>
  <!-- Blade -->
  <polygon points="30,3 34,5 36,38 24,38 26,5" fill="url(#blade)" stroke="#808080" stroke-width="1"/>
  <!-- Blade tip -->
  <polygon points="30,3 26,5 34,5" fill="#D0D0D0"/>
  <!-- Guard -->
  <rect x="18" y="37" width="24" height="4" rx="2" fill="#8B6914" stroke="#6B4914" stroke-width="1"/>
  <!-- Handle -->
  <rect x="26" y="41" width="8" height="14" rx="1" fill="#8B4513" stroke="#6B3513" stroke-width="1"/>
  <!-- Handle wrap -->
  <line x1="26" y1="44" x2="34" y2="44" stroke="#A0522D" stroke-width="1"/>
  <line x1="26" y1="48" x2="34" y2="48" stroke="#A0522D" stroke-width="1"/>
  <line x1="26" y1="52" x2="34" y2="52" stroke="#A0522D" stroke-width="1"/>
  <!-- Pommel -->
  <circle cx="30" cy="57" r="3" fill="#8B6914" stroke="#6B4914" stroke-width="1"/>
</svg>
