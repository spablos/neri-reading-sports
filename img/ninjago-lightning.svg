<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <defs>
    <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00BFFF"/>
      <stop offset="50%" style="stop-color:#1E90FF"/>
      <stop offset="100%" style="stop-color:#4169E1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Glow background -->
  <polygon points="34,2 20,26 28,26 16,58 44,30 34,30 46,6" fill="#87CEEB" opacity="0.3" filter="url(#glow)"/>
  <!-- Main bolt -->
  <polygon points="34,2 20,26 28,26 16,58 44,30 34,30 46,6" fill="url(#lg)" stroke="#0066CC" stroke-width="1"/>
  <!-- Highlight -->
  <polygon points="36,8 26,26 30,26 22,48 38,32 34,32 42,12" fill="#B0E0FF" opacity="0.5"/>
</svg>
