<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>נרי לומד לקרוא</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700;900&family=Noto+Sans+Hebrew:wght@400;700;900&family=Secular+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Floating decorations -->
        <div id="floating-decorations"></div>

        <!-- Title -->
        <header id="title-bar">
            <h1 id="main-title"></h1>
            <!-- Mode tabs (fun facts tab hidden until unlocked) -->
            <div id="mode-tabs" class="hidden">
                <button class="mode-tab active" data-mode="players">⚽ שחקנים</button>
                <button class="mode-tab" data-mode="funfacts">🧠 חידות</button>
            </div>
        </header>

        <!-- Identity badge (top-right) -->
        <div id="identity-badge" class="hidden"></div>

        <!-- Score Panel -->
        <div id="score-panel">
            <div id="score-label">ניקוד</div>
            <div id="score-value">0</div>
            <div id="streak-display"></div>
            <div id="rewards-shelf"></div>
        </div>

        <!-- Main Game Area -->
        <div id="game-container">
            <!-- Question Card (fun facts mode) -->
            <div id="question-card" class="hidden">
                <div id="question-emoji">🧠</div>
                <div id="question-text"></div>
                <div id="question-buttons">
                    <button id="hear-question-btn" title="שמע שוב את השאלה">🔊</button>
                </div>
            </div>

            <!-- Player Card -->
            <div id="player-card">
                <div id="player-avatar"></div>
                <div id="team-row">
                    <img id="team-logo" src="" alt="" width="24" height="24">
                    <div id="team-names">
                        <div id="player-team"></div>
                        <div id="player-team-en"></div>
                    </div>
                </div>
                <div id="card-buttons">
                    <button id="hear-name-card-btn" title="שמע את השם">🔊</button>
                    <button id="hear-desc-btn" title="שמע על השחקן">🎙️</button>
                </div>
            </div>

            <!-- Drop Zones (name placeholder) -->
            <div id="name-area">
                <div id="drop-zones"></div>
                <button id="hear-name-btn" title="שמע את השם">🔊</button>
                <button id="skip-btn" title="דלג">⏭️</button>
            </div>

            <!-- Hint button (shown below drop zones) -->
            <div id="action-buttons">
                <button id="hint-btn" class="hidden" title="רמז">💡 רמז</button>
            </div>

            <!-- Draggable Tokens -->
            <div id="tokens-area">
                <div id="tokens-container"></div>
            </div>
        </div>

        <!-- Feedback Overlay -->
        <div id="feedback-overlay" class="hidden">
            <div id="feedback-content"></div>
        </div>

        <!-- Celebration Overlay -->
        <div id="celebration-overlay" class="hidden">
            <div id="celebration-content"></div>
        </div>

        <!-- Milestone Reward Overlay -->
        <div id="milestone-overlay" class="hidden">
            <div id="milestone-content"></div>
        </div>

        <!-- Refresh button + version (subtle, bottom-right corner) -->
        <div id="version-bar">
            <span id="version-label">v1.1</span>
            <button id="refresh-btn" title="עדכן גירסה">🔄</button>
        </div>

        <!-- Start Screen -->
        <div id="start-screen">
            <div id="start-content">
                <h1 id="start-title"></h1>
                <div id="start-soccer">⚽</div>
                <div id="identity-buttons">
                    <button class="identity-btn" data-identity="ivri">עברי</button>
                    <button class="identity-btn identity-main" data-identity="neri">נרי</button>
                    <button class="identity-btn" data-identity="boomerim">בומרים</button>
                </div>
            </div>
            <!-- Refresh button also on start screen -->
            <div id="version-bar-start">
                <span class="version-label-copy">v1.1</span>
                <button class="refresh-btn-copy" title="עדכן גירסה">🔄</button>
            </div>
        </div>
    </div>

    <script src="players.js"></script>
    <script src="descriptions.js"></script>
    <script src="funfacts.js"></script>
    <script src="hebrew.js"></script>
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
        // Current client version (must match version.json on deploy)
        const CLIENT_VERSION = '1.1';

        // Check for newer version on server every 5 minutes
        async function checkForUpdate() {
            try {
                const resp = await fetch('version.json?t=' + Date.now());
                if (!resp.ok) return;
                const data = await resp.json();
                if (data.version && data.version !== CLIENT_VERSION) {
                    document.getElementById('version-bar').classList.add('update-available');
                    document.getElementById('version-label').textContent = CLIENT_VERSION + ' → ' + data.version;
                }
            } catch(_) {}
        }
        checkForUpdate();
        setInterval(checkForUpdate, 60 * 1000);

        // ===== Client Activity Tracker (deferred until identity selected) =====
        window._startTracking = function(identity) {
            // Persistent device ID via localStorage (survives sessions)
            let deviceId = localStorage.getItem('neri-device-id');
            if (!deviceId) {
                deviceId = 'dev-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8);
                localStorage.setItem('neri-device-id', deviceId);
            }
            const ua = navigator.userAgent;
            const info = {
                event: 'session',
                identity: identity,
                deviceId: deviceId,
                userAgent: ua,
                platform: navigator.platform || '',
                language: navigator.language || '',
                screenW: screen.width,
                screenH: screen.height,
                viewportW: window.innerWidth,
                viewportH: window.innerHeight,
                pixelRatio: window.devicePixelRatio || 1,
                touchSupport: 'ontouchstart' in window,
                online: navigator.onLine,
                referrer: document.referrer || '',
                url: location.href,
                localTime: new Date().toISOString(),
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || '',
            };
            // Detect device type
            if (/iPhone|iPad|iPod/.test(ua)) info.device = 'iOS';
            else if (/Android/.test(ua)) info.device = 'Android';
            else if (/Mac/.test(ua)) info.device = 'Mac';
            else if (/Windows/.test(ua)) info.device = 'Windows';
            else if (/Linux/.test(ua)) info.device = 'Linux';
            else info.device = 'Unknown';
            // Detect browser
            if (/CriOS/.test(ua)) info.browser = 'Chrome iOS';
            else if (/Chrome/.test(ua) && !/Edge/.test(ua)) info.browser = 'Chrome';
            else if (/Safari/.test(ua) && !/Chrome/.test(ua)) info.browser = 'Safari';
            else if (/Firefox/.test(ua)) info.browser = 'Firefox';
            else if (/Edg/.test(ua)) info.browser = 'Edge';
            else info.browser = 'Other';
            // Try to get the real public IP from client side
            const sessionStart = Date.now();
            const sendTrack = (publicIp) => {
                if (publicIp) info.publicIp = publicIp;
                fetch('/neri/api/track', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(info),
                }).then(r => r.json()).then(d => {
                // Send heartbeats every 30s to track usage duration
                const sessionId = info.sessionId || (info.ip + '-' + sessionStart);
                // Build session ID on client to match server
                const sendHeartbeat = () => {
                    const elapsed = Math.round((Date.now() - sessionStart) / 1000);
                    fetch('/neri/api/heartbeat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ sessionId: d.sessionId || sessionId, elapsed }),
                    }).catch(() => {});
                };
                setInterval(sendHeartbeat, 30000);
                // Also send on page unload
                window.addEventListener('beforeunload', sendHeartbeat);
            }).catch(() => {});
            };
            // Fetch public IP from free API, then send tracking
            fetch('https://api.ipify.org?format=json')
                .then(r => r.json())
                .then(d => sendTrack(d.ip))
                .catch(() => sendTrack(null));
        };

        // Refresh: save state, clear caches, reload
        async function hardRefresh() {
            // Save current player/fact before reloading
            if (window._game) window._game.saveState();
            if ('serviceWorker' in navigator) {
                const regs = await navigator.serviceWorker.getRegistrations();
                for (const reg of regs) await reg.unregister();
            }
            const keys = await caches.keys();
            for (const key of keys) await caches.delete(key);
            location.reload(true);
        }
        document.getElementById('refresh-btn').onclick = hardRefresh;
        document.querySelector('.refresh-btn-copy').onclick = hardRefresh;
    </script>
</body>
</html>
